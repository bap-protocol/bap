name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: pnpm install --frozen-lockfile

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('./packages/core/node_modules/playwright/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm -F @bap-protocol/core exec playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm -F @bap-protocol/core exec playwright install-deps chromium

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test -- --passWithNoTests

  schema-lint:
    name: JSON Schema lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate JSON Schemas
        run: |
          npm install --no-save ajv ajv-formats
          node -e "
            const Ajv = require('ajv/dist/2020');
            const addFormats = require('ajv-formats');
            const fs = require('fs');
            const path = require('path');
            const ajv = new Ajv({ strict: false, allErrors: true });
            addFormats(ajv);
            const dir = 'packages/spec/schemas';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));
            for (const f of files) {
              const schema = JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8'));
              try {
                ajv.compile(schema);
                console.log('OK: ' + f);
              } catch (e) {
                console.error('FAIL: ' + f + ' — ' + e.message);
                process.exit(1);
              }
            }
          "
